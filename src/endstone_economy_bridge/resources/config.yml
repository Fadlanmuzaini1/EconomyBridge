# =========================================================
# EconomyBridge - Konfigurasi
# JWEconomy (Coin) => uMoney (Money), satu arah, JWEconomy = Source of Truth
# =========================================================
settings:
  # Tampilkan log detail setiap kali sinkronisasi terjadi.
  debug: false

  # Sinkronkan saldo saat player join server.
  sync-on-join: true

  # Interval sinkronisasi berkala (dalam DETIK) untuk semua player online.
  # Isi 0 untuk mematikan scheduler berkala (hanya sync saat join).
  sync-interval: 60

  # Nama currency JWEconomy yang disinkronkan (JWEconomy mendukung multi-currency).
  # Kosongkan / null untuk memakai currency default JWEconomy.
  currency: null
